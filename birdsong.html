        /* main container - no decoration */

        /* slider wrapper - completely borderless, no shadow */
        .slider-frame {
            position: relative;
            width: 100%;
            overflow: hidden;
            background: #eaebe5;
        }

        .slider-viewport {
            overflow: hidden;
            cursor: grab;
        }
        .slider-viewport:active {
            cursor: grabbing;
        }

        .slider-track {
            display: flex;
            transition: transform 0.5s cubic-bezier(0.2, 0.96, 0.4, 1.02);
            will-change: transform;
        }

        /* each slide — clean, content fills width */
        .slide {
            flex: 0 0 100%;

        /* image and video styling — no text overlay */
        .slide-img {
            width: 100%;

            width: 100%;
            display: block;
            object-fit: cover;

        /* text slide — pure minimal text, no decoration */
        .text-slide {
            display: flex;

        .text-content .text-quote {
            font-size: 0.85rem;
            color: #555;

            padding-left: 1rem;
            margin: 1rem 0;

        }
        .text-content .text-material {
            font-size: 0.75rem;
            color: #777;
            margin-top: 1rem;
        }

        /* arrows: minimalist with circle border, black, subtle */
        .slider-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: 1px solid #111;
            border-radius: 50%;

            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;

            color: #111;
            transition: all 0.2s ease;

        .slider-arrow:hover {

        .arrow-prev {

        /* dots: outline only, minimal */

        .dot.active {
            background: #333;

        }

            border-color: #111;
        }

              
        }

        @media (max-width: 700px) {

      footer {

      /* Main exhibition image container */

<body>

<header>

    <div class="slider-frame">
        <button class="slider-arrow arrow-prev" id="prevBtn" aria-label="Previous">&lt;</button>
        <button class="slider-arrow arrow-next" id="nextBtn" aria-label="Next">&gt;</button>

        <div class="slider-viewport" id="viewport">
            <div class="slider-track" id="track">
                <!-- slides injected: media (image/video) with NO text overlay, plus one text slide at the end -->
            </div>
        </div>
    </div>

    <div class="dots" id="dotsContainer"></div>
    <div class="minimal-footer">Tatiana Ginsberg — kozo, envelope papers, natural dyes</div>
</div>

<script>
    // --------------------------------------------------------------
    // SLIDES: photos, videos (NO TEXT OVERLAY on media)
    // FINAL slide is pure text (Shimacho statement)
    // Navigation: cannot go past first slide (index 0) and cannot go past last slide (text).
    // No looping. Seamless transition.
    // --------------------------------------------------------------
    const slides = [
        { type: 'image', src: 'https://images.unsplash.com/photo-1612198288036-0a35644b7b57?w=1600&q=80&auto=format', alt: 'Kozo paper with envelope patterns' },
        { type: 'image', src: 'https://images.unsplash.com/photo-1584213418806-8acfc092c500?w=1600&q=80&auto=format', alt: 'Envelope pattern study' },
        { type: 'video', src: 'https://cdn.pixabay.com/video/2023/02/14/150765-797289560_large.mp4', alt: 'Paper making process' },
        { type: 'image', src: 'https://images.unsplash.com/photo-1612469911895-7201dd114d0e?w=1600&q=80&auto=format', alt: 'Stitched repairs' },
        { type: 'video', src: 'https://cdn.pixabay.com/video/2022/12/01/142529-778852078_large.mp4', alt: 'Hand stitching paper' },
        { type: 'image', src: 'https://images.unsplash.com/photo-1579783902614-a3fb3927f2e2?w=1600&q=80&auto=format', alt: 'Shimacho notebook' },
        // FINAL TEXT SLIDE — pure text, no media
        { type: 'text', 
          title: 'Shimacho', 
          description: 'Inspired by Japanese weaving pattern sample books. These pieces use found security envelope papers, together with my own patterned papers. Some of these materials I embed between tissue-thin layers of kozo paper as I form sheets, some I sew on top when the paper is dry.',
          quote: 'Like the beauty of boro textile repairs (often used on linings), security envelope patterns are unpretentious, utilitarian, and often unexpectedly beautiful.',
          material: 'Handmade kozo and gampi papers, with natural dyes, pigment, ink, and found security envelope papers, 2022 to present.' }
    ];

    // DOM elements
    const track = document.getElementById('track');
    const dotsContainer = document.getElementById('dotsContainer');
    const viewport = document.getElementById('viewport');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');

    let currentIndex = 0;
    const totalSlides = slides.length;
    let autoInterval = null;
    let isDragging = false;
    let startX = 0;
    let startTranslate = 0;
    let startDragIndex = 0;

    // helper: pause all videos
    function pauseAllVideos() {
        const videos = track.querySelectorAll('video');
        videos.forEach(v => v.pause());
    }

    // Build slider - NO TEXT on media slides, just pure image/video
    function buildSlider() {
        track.innerHTML = '';
        dotsContainer.innerHTML = '';

        slides.forEach((item, idx) => {
            const slideDiv = document.createElement('div');
            slideDiv.className = 'slide';

            if (item.type === 'image') {
                const img = document.createElement('img');
                img.src = item.src;
                img.alt = item.alt || `Work ${idx+1}`;
                img.className = 'slide-img';
                img.loading = idx === 0 ? 'eager' : 'lazy';
                slideDiv.appendChild(img);
            } 
            else if (item.type === 'video') {
                const video = document.createElement('video');
                video.src = item.src;
                video.className = 'slide-video';
                video.loop = true;
                video.muted = true;
                video.playsInline = true;
                video.preload = 'metadata';
                slideDiv.appendChild(video);
            }
            else if (item.type === 'text') {
                slideDiv.classList.add('text-slide');
                const textWrapper = document.createElement('div');
                textWrapper.className = 'text-content';
                textWrapper.innerHTML = `
                    <div class="text-title">${escapeText(item.title)}</div>
                    <div class="text-desc">${escapeText(item.description)}</div>
                    <div class="text-quote">${escapeText(item.quote)}</div>
                    <div class="text-material">${escapeText(item.material)}</div>
                `;
                slideDiv.appendChild(textWrapper);
            }
            track.appendChild(slideDiv);
        });

        // create dots (outline only)
        for (let i = 0; i < totalSlides; i++) {
            const dot = document.createElement('div');
            dot.classList.add('dot');
            if (i === currentIndex) dot.classList.add('active');
            dot.setAttribute('data-index', i);
            dot.addEventListener('click', (e) => {
                e.stopPropagation();
                const targetIdx = parseInt(dot.getAttribute('data-index'), 10);
                goToSlide(targetIdx);
                resetAutoPlay();
            });
            dotsContainer.appendChild(dot);
        }
    }

    function escapeText(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function getViewportWidth() {
        return viewport ? viewport.clientWidth : window.innerWidth;
    }

    // update track position based on currentIndex — seamless transition
    function updatePosition(animate = true) {
        if (!track) return;
        const slideW = getViewportWidth();
        const newTranslate = -currentIndex * slideW;
        if (!animate) {
            track.style.transition = 'none';
        } else {
            track.style.transition = 'transform 0.5s cubic-bezier(0.2, 0.96, 0.4, 1.02)';
        }
        track.style.transform = `translateX(${newTranslate}px)`;
        if (!animate) {
            void track.offsetHeight;
            track.style.transition = 'transform 0.5s cubic-bezier(0.2, 0.96, 0.4, 1.02)';
        }
        updateDots();
        handleVideo();
    }

    function handleVideo() {
        pauseAllVideos();
        const slidesElements = document.querySelectorAll('.slide');
        if (slidesElements[currentIndex]) {
            const videoElem = slidesElements[currentIndex].querySelector('video');
            if (videoElem && slides[currentIndex].type === 'video') {
                videoElem.muted = true;
                videoElem.play().catch(e => console.log(''));
            }
        }
    }

    function updateDots() {
        const dots = document.querySelectorAll('.dot');
        dots.forEach((dot, i) => {
            if (i === currentIndex) dot.classList.add('active');
            else dot.classList.remove('active');
        });
    }

    // NAVIGATION WITH BOUNDARIES: no wrap-around.
    // Cannot go below 0, cannot go above totalSlides-1.
    function goToSlide(index) {
        if (index < 0) index = 0;
        if (index >= totalSlides) index = totalSlides - 1;
        if (currentIndex === index) return;
        currentIndex = index;
        updatePosition(true);
    }

    function nextSlide() {
        let newIndex = currentIndex + 1;
        if (newIndex >= totalSlides) {
            // stuck at last slide — cannot go past text slide
            return;
        }
        goToSlide(newIndex);
        resetAutoPlay();
    }

    function prevSlide() {
        let newIndex = currentIndex - 1;
        if (newIndex < 0) {
            // stuck at first slide — cannot go before first
            return;
        }
        goToSlide(newIndex);
        resetAutoPlay();
    }

    // Autoplay: stops at last slide
    function startAutoPlay() {
        if (autoInterval) clearInterval(autoInterval);
        autoInterval = setInterval(() => {
            if (currentIndex < totalSlides - 1) {
                nextSlide();
            } else {
                stopAutoPlay();
            }
        }, 5500);
    }

    function stopAutoPlay() {
        if (autoInterval) {
            clearInterval(autoInterval);
            autoInterval = null;
        }
    }

    function resetAutoPlay() {
        stopAutoPlay();
        startAutoPlay();
    }

    // resize handler
    function onResize() {
        if (!track) return;
        const slideW = getViewportWidth();
        track.style.transition = 'none';
        track.style.transform = `translateX(${-currentIndex * slideW}px)`;
        void track.offsetHeight;
        track.style.transition = 'transform 0.5s cubic-bezier(0.2, 0.96, 0.4, 1.02)';
        handleVideo();
    }

    // ---------- DRAG WITH BOUNDARIES (no wrap, seamless) ----------
    let dragActive = false;
    let dragInitialX = 0;
    let dragInitialTranslateVal = 0;
    let dragStartIdx = 0;

    function onDragStart(e) {
        if (e.target.closest('.slider-arrow') || e.target.closest('.dot')) return;
        e.preventDefault();
        dragActive = true;
        stopAutoPlay();
        const clientX = e.type === 'mousedown' ? e.clientX : e.touches[0].clientX;
        dragInitialX = clientX;
        const slideW = getViewportWidth();
        dragInitialTranslateVal = -currentIndex * slideW;
        track.style.transition = 'none';
        dragStartIdx = currentIndex;
    }

    function onDragMove(e) {
        if (!dragActive) return;
        const clientX = e.type === 'mousemove' ? e.clientX : e.touches[0].clientX;
        const delta = clientX - dragInitialX;
        const slideW = getViewportWidth();
        let newTranslate = dragInitialTranslateVal + delta;
        // boundaries: restrict translation so that we cannot show beyond slide 0 or last slide
        const minTranslate = -(totalSlides - 1) * slideW;
        const maxTranslate = 0;
        if (newTranslate > maxTranslate) {
            newTranslate = maxTranslate + (newTranslate - maxTranslate) * 0.2;
        }
        if (newTranslate < minTranslate) {
            newTranslate = minTranslate + (newTranslate - minTranslate) * 0.2;
        }
        track.style.transform = `translateX(${newTranslate}px)`;
    }

    function onDragEnd(e) {
        if (!dragActive) {
            if (track) track.style.transition = 'transform 0.5s cubic-bezier(0.2, 0.96, 0.4, 1.02)';
            return;
        }
        dragActive = false;
        const slideW = getViewportWidth();
        const endClientX = e.type === 'mouseup' ? e.clientX : (e.changedTouches ? e.changedTouches[0].clientX : dragInitialX);
        const deltaX = endClientX - dragInitialX;
        let targetIdx = dragStartIdx;
        const threshold = slideW * 0.2;

        if (Math.abs(deltaX) > threshold) {
            if (deltaX < 0) targetIdx = dragStartIdx + 1;
            else if (deltaX > 0) targetIdx = dragStartIdx - 1;
        } else {
            targetIdx = dragStartIdx;
        }
        // clamp to boundaries
        if (targetIdx < 0) targetIdx = 0;
        if (targetIdx >= totalSlides) targetIdx = totalSlides - 1;
        
        currentIndex = targetIdx;
        updatePosition(true);
        handleVideo();
        startAutoPlay();
        track.style.transition = 'transform 0.5s cubic-bezier(0.2, 0.96, 0.4, 1.02)';
    }

    function initDrag() {
        const area = document.querySelector('.slider-viewport');
        if (!area) return;
        area.addEventListener('mousedown', onDragStart);
        area.addEventListener('touchstart', onDragStart, { passive: false });
        window.addEventListener('mousemove', onDragMove);
        window.addEventListener('touchmove', onDragMove, { passive: false });
        window.addEventListener('mouseup', onDragEnd);
        window.addEventListener('touchend', onDragEnd);
        // prevent image drag
        const imgs = document.querySelectorAll('.slide-img');
        imgs.forEach(img => img.addEventListener('dragstart', (e) => e.preventDefault()));
    }

    // keyboard navigation with boundaries
    function onKey(e) {
        if (e.key === 'ArrowLeft') {
            prevSlide();
            e.preventDefault();
        } else if (e.key === 'ArrowRight') {
            nextSlide();
            e.preventDefault();
        }
    }

    // Hover pause
    function initHoverPause() {
        const container = document.querySelector('.slider-frame');
        if (!container) return;
        container.addEventListener('mouseenter', () => stopAutoPlay());
        container.addEventListener('mouseleave', () => {
            if (currentIndex < totalSlides - 1) startAutoPlay();
            else stopAutoPlay();
        });
        container.addEventListener('touchstart', () => stopAutoPlay(), { passive: true });
        container.addEventListener('touchend', () => {
            if (currentIndex < totalSlides - 1) startAutoPlay();
        });
    }

    // initial setup
    function init() {
        buildSlider();
        setTimeout(() => {
            updatePosition(false);
            handleVideo();
        }, 20);
        startAutoPlay();
        initDrag();
        window.addEventListener('resize', onResize);
        prevBtn.addEventListener('click', (e) => {
            e.preventDefault();
            prevSlide();
        });
        nextBtn.addEventListener('click', (e) => {
            e.preventDefault();
            nextSlide();
        });
        window.addEventListener('keydown', onKey);
        initHoverPause();
        // disable context menu on images for cleanliness
        const allImgs = document.querySelectorAll('.slide-img');
        allImgs.forEach(img => img.addEventListener('contextmenu', (e) => e.preventDefault()));
    }

    init();
</script>
